name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run smoke tests (no training required — uses committed artifacts)
        env:
          PYTHONUTF8: "1"
        run: |
          # test_llm_scoring 의 forward-pass 테스트는 torch 미설치 시 자동 skip,
          # 프롬프트 일관성/엔드포인트(503·llm_status·모델선택기) 테스트는 항상 실행.
          pytest tests/test_smoke.py tests/test_llm_scoring.py -v

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (verify Dockerfile builds cleanly)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: css-rating2:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test container
        run: |
          docker run -d --name css-rating2-test -p 8080:8080 css-rating2:ci
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/healthz; then
              echo "Healthy"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:8080/api/compare | head -c 200
          docker logs css-rating2-test | tail -20
          docker stop css-rating2-test
