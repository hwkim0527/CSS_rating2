# Cloud Build → Cloud Run GPU(NVIDIA L4) 배포 — Qwen3-14B LLM 채점 활성화.
#
# 선행 1회 설정 (deploy/setup_service_account.sh 참고):
#   - Drive API 활성화
#   - 런타임 서비스 계정 생성, Qwen3_fintech 폴더를 그 SA 이메일과 공유(뷰어)
#   (Qwen3-14B 는 공개 모델이라 HF 토큰 불필요. 베이스 모델은 첫 추론 시
#    HF Hub 에서 받아 인스턴스 캐시에 보관됨 — min-instances=1 이라 1회만.)
#
# 사용:
#   gcloud builds submit --config deploy/cloudbuild_gpu.yaml \
#     --substitutions _REGION=us-central1,_RUNTIME_SA=css-rating2-run@$PROJECT_ID.iam.gserviceaccount.com
#
# 참고:
#   - 이미지 이름의 $PROJECT_ID 는 빌드 시점 자동 치환 내장 변수(직접 사용).
#   - 인라인 bash 셸 변수는 $$ 로 이스케이프(Cloud Build 치환과 충돌 방지).
#   - L4 GPU 드라이버는 CUDA 12.2 → Dockerfile.gpu 는 cu121 torch 사용.
#   - 메모리 32Gi/8CPU: 14B 4bit 로딩 시 RAM 피크 대비.
#   - _MIN_INSTANCES(기본 0): 0=scale-to-zero(유휴 시 GPU 과금 0, 단 첫 요청 콜드
#     스타트 수분 — 이미지 pull + 14B 로딩). 1=상시 1대 유지(콜드스타트 회피, 단
#     GPU 상시 과금 ~$300-500/월). 데모/검증은 0 권장, 라이브 시연만 1.
#   - HF_HUB_DISABLE_XET=1: HF xet 프로토콜이 GCP IP대역에서 429 유발 → 비활성 필수.
#   - 데모 종료 시 과금 완전 중단: gcloud run services delete css-rating2-gpu --region=us-central1
#   - Cloud Run GPU(L4)는 us-central1 등 일부 리전만 지원(서울 미지원).
substitutions:
  _SERVICE: css-rating2-gpu
  _REGION: us-central1
  _RUNTIME_SA: ""        # 비우면 프로젝트 기본 compute SA 사용(권장: 전용 SA 지정)
  _DRIVE_FOLDER_ID: "1q6P-9a_U3bvln9XKeTKpe-3D6bNj-yYY"     # 어댑터(LoRA) 폴더
  _BASE_DRIVE_FOLDER_ID: ""   # 베이스 모델(Qwen3-14B) Drive 폴더 ID — HF 429 우회용
  _MIN_INSTANCES: "0"         # 0=scale-to-zero(과금 안전·콜드스타트), 1=상시(과금)

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - "-f"
      - "Dockerfile.gpu"
      - "-t"
      - "gcr.io/$PROJECT_ID/css-rating2-gpu:latest"
      - "."
  - name: gcr.io/cloud-builders/docker
    args: ["push", "gcr.io/$PROJECT_ID/css-rating2-gpu:latest"]
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - "-c"
      - |
        set -e
        SA_FLAG=""
        if [ -n "${_RUNTIME_SA}" ]; then SA_FLAG="--service-account=${_RUNTIME_SA}"; fi
        gcloud run deploy ${_SERVICE} \
          --image=gcr.io/$PROJECT_ID/css-rating2-gpu:latest \
          --region=${_REGION} \
          --platform=managed \
          --allow-unauthenticated \
          --gpu=1 \
          --gpu-type=nvidia-l4 \
          --no-gpu-zonal-redundancy \
          --cpu=8 \
          --memory=32Gi \
          --port=8080 \
          --max-instances=1 \
          --min-instances=${_MIN_INSTANCES} \
          --concurrency=4 \
          --timeout=600s \
          --no-cpu-throttling \
          $$SA_FLAG \
          --set-env-vars=CSS_ENABLE_LLM=1,CSS_LLM_BASE=Qwen/Qwen3-14B,CSS_LLM_DRIVE_FOLDER_ID=${_DRIVE_FOLDER_ID},CSS_LLM_BASE_DRIVE_FOLDER_ID=${_BASE_DRIVE_FOLDER_ID},CSS_LLM_GDRIVE_USE_ADC=1,HF_HOME=/app/.hf_cache,HF_HUB_ENABLE_HF_TRANSFER=0,HF_HUB_DISABLE_XET=1,HF_HUB_DOWNLOAD_TIMEOUT=60

images:
  - "gcr.io/$PROJECT_ID/css-rating2-gpu:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
