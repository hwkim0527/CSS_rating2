# Cloud Build → Cloud Run GPU(NVIDIA L4) 배포 — Qwen3-14B LLM 채점 활성화.
#
# 선행 1회 설정 (deploy/setup_service_account.sh 참고):
#   - Drive API 활성화
#   - 런타임 서비스 계정 생성, Qwen3_fintech 폴더를 그 SA 이메일과 공유(뷰어)
#
# 사용:
#   gcloud builds submit --config deploy/cloudbuild_gpu.yaml \
#     --substitutions _REGION=us-central1,_RUNTIME_SA=css-rating2-run@$PROJECT_ID.iam.gserviceaccount.com,_DRIVE_FOLDER_ID=1q6P-9a_U3bvln9XKeTKpe-3D6bNj-yYY
#
# ⚠️ Cloud Run GPU(L4)는 일부 리전만 지원: us-central1, europe-west1,
#    asia-southeast1 등. asia-northeast3(서울)은 미지원이라 기본을 us-central1 로 둠.
substitutions:
  _SERVICE: css-rating2-gpu
  _REGION: us-central1
  _IMAGE: gcr.io/$PROJECT_ID/css-rating2-gpu
  _RUNTIME_SA: ""        # 비우면 프로젝트 기본 compute SA 사용(권장: 전용 SA 지정)
  _DRIVE_FOLDER_ID: "1q6P-9a_U3bvln9XKeTKpe-3D6bNj-yYY"

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - "-f"
      - "Dockerfile.gpu"
      - "-t"
      - "${_IMAGE}:${SHORT_SHA}"
      - "-t"
      - "${_IMAGE}:latest"
      - "."
  - name: gcr.io/cloud-builders/docker
    args: ["push", "${_IMAGE}:${SHORT_SHA}"]
  - name: gcr.io/cloud-builders/docker
    args: ["push", "${_IMAGE}:latest"]
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - "-c"
      - |
        set -e
        SA_FLAG=""
        if [ -n "${_RUNTIME_SA}" ]; then SA_FLAG="--service-account=${_RUNTIME_SA}"; fi
        gcloud run deploy ${_SERVICE} \
          --image=${_IMAGE}:${SHORT_SHA} \
          --region=${_REGION} \
          --platform=managed \
          --allow-unauthenticated \
          --gpu=1 \
          --gpu-type=nvidia-l4 \
          --no-gpu-zonal-redundancy \
          --cpu=4 \
          --memory=16Gi \
          --port=8080 \
          --max-instances=1 \
          --min-instances=0 \
          --concurrency=4 \
          --timeout=600s \
          --no-cpu-throttling \
          $SA_FLAG \
          --set-env-vars=CSS_ENABLE_LLM=1,CSS_LLM_BASE=Qwen/Qwen3-14B,CSS_LLM_DRIVE_FOLDER_ID=${_DRIVE_FOLDER_ID},CSS_LLM_GDRIVE_USE_ADC=1,HF_HOME=/app/.hf_cache

images:
  - "${_IMAGE}:${SHORT_SHA}"
  - "${_IMAGE}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
