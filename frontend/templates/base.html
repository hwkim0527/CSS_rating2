<!DOCTYPE html>
<html lang="ko">
<head>

  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>

    <div class="brand">

      <span>CSS Rating <strong>2</strong></span>

  {% block scripts %}{% endblock %}

</html>
