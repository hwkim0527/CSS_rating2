# 학습 하이퍼파라미터 (참고용)
preprocess:
  sample_size: null         # null=전체 (~2.26M)
  random_seed: 42
  train_size: 0.70
  val_size: 0.15
  test_size: 0.15

xgboost:
  n_estimators: 600
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.9
  colsample_bytree: 0.8
  early_stopping_rounds: 30

llm:
  base_model: Qwen/Qwen2.5-7B-Instruct
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  effective_batch: 16
  learning_rate: 2.0e-4
  num_epochs: 3
  max_seq_length: 1024
  quantization: nf4
  compute_dtype: bfloat16
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

success_criteria:
  metric: roc_auc
  target_absolute_improvement_over_baseline: 0.05
