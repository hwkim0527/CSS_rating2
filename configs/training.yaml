# 학습 하이퍼파라미터 (참고용)
preprocess:
  sample_size: null         # null=전체 (~2.26M)
  random_seed: 42
  train_size: 0.70
  val_size: 0.15
  test_size: 0.15

xgboost:
  n_estimators: 600
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.9
  colsample_bytree: 0.8
  early_stopping_rounds: 30

llm:
  # Qwen2.5-7B → Qwen3-14B 업그레이드 (동급 대비 약 1.5세대 성능 향상).
  # transformers>=4.51.0 필요.
  base_model: Qwen/Qwen3-14B
  adapter_dir: artifacts/qwen3_lora
  # 최종 모델: Qwen3-14B QLoRA, 50k 샘플 / r=16 / α32 (라이브 AUC 0.763, XGBoost 와 대등).
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  # T4(16GB) 안전값. L4/A100 에서는 노트북이 batch 2~4 로 상향.
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  effective_batch: 8
  learning_rate: 2.0e-4
  num_epochs: 3
  max_seq_length: 512
  quantization: nf4
  compute_dtype: bfloat16   # T4 는 코드에서 fp16 으로 자동 폴백
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  # 체크포인트 (output_dir 가 Drive 면 Drive 에 누적, 끊겨도 auto 재개)
  save_steps: 50
  save_total_limit: 2
  # 학습 완료 후 최종 어댑터 저장 위치 (Colab → Google Drive)
  drive_output_dir: "/content/drive/MyDrive/Colab Notebooks/Qwen3_fintech"

success_criteria:
  metric: roc_auc
  target_absolute_improvement_over_baseline: 0.05
